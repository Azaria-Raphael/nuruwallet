name: nuruwallet
description: "NuruWallet - Illuminate Your Finances. A personal finance app for Tanzania."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # Database — local persistent storage
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Secure Storage — Android Keystore backed
  flutter_secure_storage: ^9.0.0

  # Lightweight key-value storage for settings
  shared_preferences: ^2.2.3

  # Cryptography — PIN hashing
  crypto: ^3.0.3

  # Unique ID generation
  uuid: ^4.4.0

  # Date and currency formatting
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.2.1

  # UI animations
  flutter_animate: ^4.5.0

  # File path utilities
  path_provider: ^2.1.3

  # File sharing (export CSV / PDF)
  share_plus: ^10.0.0

  # PDF generation (export report)
  pdf: ^3.10.8

  # Excel (.xlsx) generation
  excel: ^4.0.6

  # Open exported files directly in device viewer
  # open_file_plus: ^4.7.0
  open_filex: ^4.7.0

  # Icons pack
  cupertino_icons: ^1.0.8

  # Biometric / local authentication
  local_auth: ^2.3.0

  # Local push notifications (budget alerts, reminders, goal deadlines)
  flutter_local_notifications: ^17.2.4

  # Receipt photo capture / gallery picker
  image_picker: ^1.1.2


  coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.3'
coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.3'


dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
